# TouhouCCB nginx 站点配置
# 用法：
#   sudo ln -s /data/sunyunbo/www/TouhouCCB/deploy/nginx.conf /etc/nginx/sites-enabled/thccb.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS：用 certbot 自动签发
#   sudo certbot --nginx -d thccb.example.com

# ── 速率限制区域（放在 server 块外部，或 http 块内）──
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_admin:10m   rate=2r/s;
limit_req_zone $binary_remote_addr zone=api_trade:10m   rate=10r/s;

server {
    listen 80;
    server_name thccb.example.com;  # 改成你的域名

    # ── 安全响应头 ──
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS：certbot 配置 HTTPS 后取消注释
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── gzip ──
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;
    gzip_min_length 256;

    # ── 前端静态文件 ──
    root /data/sunyunbo/www/TouhouCCB/thccb-frontend/dist;
    index index.html;

    # SPA fallback：所有非文件请求回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（Vite 构建产物带 hash，可长期缓存）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── 认证接口（严格限速：防暴力破解）──
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # ── 交易接口（中等限速）──
    location ~ ^/api/v1/market/(buy|sell|quote) {
        limit_req zone=api_trade burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # ── 管理面板（最严限速）──
    location /api/v1/admin/ {
        limit_req zone=api_admin burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 通用 API（宽松限速）──
    location /api/v1/ {
        limit_req zone=api_general burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
    }

    # ── SSE 流（需要关闭缓冲，不限速）──
    location /api/v1/stream/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        # 关键：关闭缓冲，否则 SSE 事件会被攒包
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # SSE 长连接超时（后端最大 1 小时）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 后端 Swagger docs ──
    location /docs {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
    }
}
